name: Deploy to Render
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        
    - name: Test app
      run: python -m pytest tests/ || echo "Tests skipped"
      
    - name: Deploy to Render
      if: github.ref == 'refs/heads/main'
      run: |
        curl -X POST \
          "https://api.render.com/webhooks/${{ secrets.RENDER_WEBHOOK }}"
